<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Masseur – Corse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sea:#1B3D5C; --sea-light:#2A5278; --sand:#E8DCC8;
    --sand-light:#F5F0E8; --coral:#C4714A; --white:#FDFCFA;
    --text:#1A1A1A; --muted:#7A8A96;
    --hour-h:44px; --col-w:148px; --time-w:68px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--sand-light);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;}

  /* Header */
  header{background:var(--sea);color:var(--white);padding:22px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  header h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;}
  header .subtitle{font-size:11px;font-weight:300;color:#8FAFC7;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
  .week-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .week-label{font-size:13px;font-weight:500;color:var(--sand);}
  .week-input{background:var(--sea-light);border:1px solid #3A6285;color:var(--white);font-family:'Inter',sans-serif;font-size:12px;padding:5px 8px;border-radius:6px;cursor:pointer;outline:none;}
  .week-input::-webkit-calendar-picker-indicator{filter:invert(.7);}
  .btn-primary{background:var(--coral);color:var(--white);border:none;padding:8px 16px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
  .btn-primary:hover{opacity:.9;}

  /* Grid */
  .grid-outer{padding:24px 28px 36px;overflow-x:auto;}
  .grid-wrap{min-width:1110px;background:var(--white);border-radius:12px;box-shadow:0 4px 20px rgba(27,61,92,.10);overflow:hidden;}
  .day-headers{display:grid;grid-template-columns:var(--time-w) repeat(7,var(--col-w));border-bottom:2px solid var(--sand);}
  .dh-spacer{background:var(--sea);}
  .dh-cell{background:var(--sea);color:var(--white);text-align:center;padding:12px 4px;border-left:1px solid #2A5278;}
  .dh-cell .dname{font-family:'Playfair Display',serif;font-size:13px;font-weight:500;}
  .dh-cell .ddate{font-size:10px;color:#8FAFC7;margin-top:2px;}
  .dh-cell.today{background:var(--coral);}
  .dh-cell.today .ddate{color:#F5C8B0;}
  .grid-body{display:grid;grid-template-columns:var(--time-w) repeat(7,var(--col-w));}
  .time-col{display:flex;flex-direction:column;border-right:1px solid var(--sand);}
  .time-slot{height:var(--hour-h);display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 8px 0 0;font-size:10px;color:var(--muted);font-weight:500;border-bottom:1px solid #EDE8DF;flex-shrink:0;}
  .day-col{border-left:1px solid #EDE8DF;display:flex;flex-direction:column;position:relative;}
  .hour-row{height:var(--hour-h);border-bottom:1px solid #EDE8DF;flex-shrink:0;}
  .hour-row:hover{background:#F7F3ED;cursor:pointer;}

  /* Appointment cards */
  .appt{
    position:absolute;left:3px;right:3px;border-radius:7px;
    padding:4px 6px;cursor:pointer;z-index:2;
    border-left:3px solid transparent;
    transition:box-shadow .12s;
  }
  .appt:hover{box-shadow:0 4px 14px rgba(27,61,92,.22);z-index:10;}
  .appt-blue{background:linear-gradient(135deg,#D6E8F5,#C3D9EE);border-left-color:var(--sea);}
  .appt-coral{background:linear-gradient(135deg,#F5DDD3,#EEC9B8);border-left-color:var(--coral);}
  .appt-green{background:linear-gradient(135deg,#D6EDE0,#BDE0CB);border-left-color:#3A8C5C;}
  .appt-purple{background:linear-gradient(135deg,#E5D9F2,#D4C5EA);border-left-color:#7952B3;}
  .appt .a-name{font-size:11px;font-weight:600;color:var(--sea);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .appt .a-phone{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;}
  .appt .a-dur{font-size:9px;color:var(--muted);margin-top:1px;font-style:italic;}

  /* Legend */
  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:0 28px 24px;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
  .legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
  .hint{margin-left:auto;font-size:10px;color:#b0bbc4;}

  /* ── MODAL GÉNÉRIQUE ── */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(27,61,92,.48);z-index:300;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--white);border-radius:14px;padding:26px 28px 24px;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.28);position:relative;}
  .modal h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--sea);margin-bottom:16px;}
  .modal label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;margin-top:12px;}
  .modal input,.modal select{width:100%;padding:8px 10px;border:1.5px solid var(--sand);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--sand-light);outline:none;}
  .modal input:focus,.modal select:focus{border-color:var(--sea);}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .btn-save{flex:1;background:var(--sea);color:var(--white);border:none;padding:10px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-save:hover{background:var(--sea-light);}
  .btn-del{background:#fee2e2;color:#b91c1c;border:none;padding:10px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-del:hover{background:#fecaca;}
  .btn-cancel{flex:1;background:transparent;color:var(--muted);border:1.5px solid var(--sand);padding:10px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;}
  .btn-cancel:hover{border-color:var(--coral);color:var(--coral);}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;}

  @media print{
    header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .grid-wrap{box-shadow:none;}
    .week-nav,.legend{display:none;}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Planning de la semaine</h1>
    <div class="subtitle">Masseur Professionnel · Corse</div>
  </div>
  <div class="week-nav">
    <span class="week-label" id="week-range">—</span>
    <input type="week" class="week-input" id="week-picker">
    <button class="btn-primary" id="btn-new">+ Rendez-vous</button>
  </div>
</header>

<div class="grid-outer">
  <div class="grid-wrap">
    <div class="day-headers">
      <div class="dh-spacer"></div>
      <div class="dh-cell" id="dh-0"><div class="dname">Lundi</div><div class="ddate" id="dd-0"></div></div>
      <div class="dh-cell" id="dh-1"><div class="dname">Mardi</div><div class="ddate" id="dd-1"></div></div>
      <div class="dh-cell" id="dh-2"><div class="dname">Mercredi</div><div class="ddate" id="dd-2"></div></div>
      <div class="dh-cell" id="dh-3"><div class="dname">Jeudi</div><div class="ddate" id="dd-3"></div></div>
      <div class="dh-cell" id="dh-4"><div class="dname">Vendredi</div><div class="ddate" id="dd-4"></div></div>
      <div class="dh-cell" id="dh-5"><div class="dname">Samedi</div><div class="ddate" id="dd-5"></div></div>
      <div class="dh-cell" id="dh-6"><div class="dname">Dimanche</div><div class="ddate" id="dd-6"></div></div>
    </div>
    <div class="grid-body" id="grid-body"></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#C3D9EE;border-left:3px solid #1B3D5C;"></div>Relaxant</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EEC9B8;border-left:3px solid #C4714A;"></div>Sportif</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BDE0CB;border-left:3px solid #3A8C5C;"></div>Thérapeutique</div>
  <div class="legend-item"><div class="legend-dot" style="background:#D4C5EA;border-left:3px solid #7952B3;"></div>Autre / Forfait</div>
  <div class="hint">Clic sur une case vide pour ajouter · Clic sur un RDV pour modifier ou supprimer</div>
</div>

<!-- Modal unique : ajouter ET modifier -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-close" id="modal-close-btn">×</button>
    <h2 id="modal-title">Nouveau rendez-vous</h2>
    <label>Prénom &amp; Nom</label>
    <input type="text" id="m-name" placeholder="ex. Marie Rossi">
    <label>Téléphone</label>
    <input type="tel" id="m-phone" placeholder="ex. 06 12 34 56 78">
    <label>Jour</label>
    <select id="m-day">
      <option value="0">Lundi</option><option value="1">Mardi</option>
      <option value="2">Mercredi</option><option value="3">Jeudi</option>
      <option value="4">Vendredi</option><option value="5">Samedi</option>
      <option value="6">Dimanche</option>
    </select>
    <label>Heure de début</label>
    <select id="m-start"></select>
    <label>Durée</label>
    <select id="m-dur">
      <option value="0.5">30 min</option>
      <option value="1" selected>1 heure</option>
      <option value="1.5">1h30</option>
      <option value="2">2 heures</option>
    </select>
    <label>Type de massage</label>
    <select id="m-type">
      <option value="appt-blue">Relaxant</option>
      <option value="appt-coral">Sportif</option>
      <option value="appt-green">Thérapeutique</option>
      <option value="appt-purple">Autre / Forfait</option>
    </select>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
const H_START = 9, H_END = 19, H_PX = 44;
const STORE_KEY = 'masseur_v3';

// Charger données (clé v3 = toujours vierge au premier lancement)
let appts = [];
try { appts = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e){}

let editIdx = -1; // -1 = nouveau RDV, sinon index dans appts

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(appts));
}

/* ── Grille ── */
function buildGrid() {
  const body = document.getElementById('grid-body');
  body.innerHTML = '';
  const hours = H_END - H_START;

  const tc = document.createElement('div');
  tc.className = 'time-col';
  for (let h = 0; h < hours; h++) {
    const s = document.createElement('div');
    s.className = 'time-slot';
    s.textContent = String(H_START + h).padStart(2,'0') + ':00';
    tc.appendChild(s);
  }
  body.appendChild(tc);

  for (let d = 0; d < 7; d++) {
    const col = document.createElement('div');
    col.className = 'day-col';
    for (let h = 0; h < hours; h++) {
      const row = document.createElement('div');
      row.className = 'hour-row';
      // Clic sur case vide → nouveau RDV
      row.addEventListener('click', () => openModal(-1, d, H_START + h));
      col.appendChild(row);
    }
    body.appendChild(col);
  }
}

function renderAppts() {
  document.querySelectorAll('.appt').forEach(el => el.remove());
  const cols = document.querySelectorAll('.day-col');

  appts.forEach((a, idx) => {
    if (a.day < 0 || a.day > 6) return;
    if (a.startHour < H_START || a.startHour >= H_END) return;
    const col = cols[a.day];
    const top = (a.startHour - H_START) * H_PX + 2;
    const h   = Math.min(a.duration, H_END - a.startHour) * H_PX - 4;

    const card = document.createElement('div');
    card.className = 'appt ' + (a.color || 'appt-blue');
    card.style.cssText = `top:${top}px;height:${h}px;`;
    card.innerHTML =
      `<div class="a-name">${a.name}</div>` +
      `<div class="a-phone">${a.phone}</div>` +
      (h > 52 ? `<div class="a-dur">${durLabel(a.duration)}</div>` : '');

    // Clic sur carte → ouvrir modale de modification
    card.addEventListener('click', e => { e.stopPropagation(); openModal(idx); });
    col.appendChild(card);
  });
}

function durLabel(d) {
  return d === 0.5 ? '30 min' : d === 1 ? '1 heure' : d === 1.5 ? '1h30' : d + 'h';
}

/* ── Modale ── */
function populateStartSelect(selected) {
  const sel = document.getElementById('m-start');
  sel.innerHTML = '';
  for (let h = H_START; h < H_END; h++) {
    [0, 0.5].forEach(half => {
      const v = h + half;
      const opt = document.createElement('option');
      opt.value = v;
      const hh = String(h).padStart(2,'0');
      const mm = half === 0 ? '00' : '30';
      opt.textContent = `${hh}:${mm}`;
      if (v === selected) opt.selected = true;
      sel.appendChild(opt);
    });
  }
}

function openModal(idx, defaultDay, defaultHour) {
  editIdx = idx;
  const isEdit = idx >= 0;
  document.getElementById('modal-title').textContent = isEdit ? 'Modifier le rendez-vous' : 'Nouveau rendez-vous';

  if (isEdit) {
    const a = appts[idx];
    document.getElementById('m-name').value  = a.name;
    document.getElementById('m-phone').value = a.phone;
    document.getElementById('m-day').value   = a.day;
    populateStartSelect(a.startHour);
    document.getElementById('m-dur').value   = a.duration;
    document.getElementById('m-type').value  = a.color || 'appt-blue';
  } else {
    document.getElementById('m-name').value  = '';
    document.getElementById('m-phone').value = '';
    document.getElementById('m-day').value   = defaultDay !== undefined ? defaultDay : 0;
    populateStartSelect(defaultHour !== undefined ? defaultHour : H_START);
    document.getElementById('m-dur').value   = '1';
    document.getElementById('m-type').value  = 'appt-blue';
  }

  // Boutons selon mode
  const actions = document.getElementById('modal-actions');
  if (isEdit) {
    actions.innerHTML =
      `<button class="btn-del" id="btn-del">🗑 Supprimer</button>` +
      `<button class="btn-cancel" id="btn-cancel">Annuler</button>` +
      `<button class="btn-save" id="btn-save">✓ Enregistrer</button>`;
    document.getElementById('btn-del').onclick    = deleteAppt;
    document.getElementById('btn-cancel').onclick = closeModal;
    document.getElementById('btn-save').onclick   = saveAppt;
  } else {
    actions.innerHTML =
      `<button class="btn-cancel" id="btn-cancel">Annuler</button>` +
      `<button class="btn-save" id="btn-save">Ajouter</button>`;
    document.getElementById('btn-cancel').onclick = closeModal;
    document.getElementById('btn-save').onclick   = saveAppt;
  }

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function saveAppt() {
  const name  = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  if (!name) { alert('Merci de renseigner le nom du client.'); return; }

  const obj = {
    name,
    phone,
    day:       parseInt(document.getElementById('m-day').value),
    startHour: parseFloat(document.getElementById('m-start').value),
    duration:  parseFloat(document.getElementById('m-dur').value),
    color:     document.getElementById('m-type').value
  };

  if (editIdx >= 0) {
    appts[editIdx] = obj;
  } else {
    appts.push(obj);
  }
  save();
  renderAppts();
  closeModal();
}

function deleteAppt() {
  if (!confirm('Supprimer ce rendez-vous ?')) return;
  appts.splice(editIdx, 1);
  save();
  renderAppts();
  closeModal();
}

/* ── Semaine ── */
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  dt.setHours(0,0,0,0);
  return dt;
}
function fmt(d) {
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}
function isoWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
  const y0 = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y0)/86400000)+1)/7);
}
function applyWeek(mon) {
  for (let d=0;d<7;d++){
    const dt=new Date(mon); dt.setDate(dt.getDate()+d);
    document.getElementById('dd-'+d).textContent=fmt(dt);
    document.getElementById('dh-'+d).classList.toggle('today',dt.toDateString()===new Date().toDateString());
  }
  const end=new Date(mon); end.setDate(end.getDate()+6);
  document.getElementById('week-range').textContent=fmt(mon)+' – '+fmt(end);
  document.getElementById('week-picker').value=mon.getFullYear()+'-W'+String(isoWeek(mon)).padStart(2,'0');
}

document.getElementById('week-picker').addEventListener('change',function(){
  if(!this.value)return;
  const [y,wStr]=this.value.split('-W');
  const week=parseInt(wStr);
  const jan4=new Date(parseInt(y),0,4);
  const mon=new Date(jan4);
  mon.setDate(jan4.getDate()-((jan4.getDay()+6)%7)+(week-1)*7);
  applyWeek(mon);
});

document.getElementById('btn-new').addEventListener('click',()=>openModal(-1));
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});

/* ── Init ── */
buildGrid();
applyWeek(getMonday(new Date()));
renderAppts();
</script>
</body>
</html>
